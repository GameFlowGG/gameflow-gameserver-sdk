version: '3'

tasks:
  install:
    desc: Install all workspace dependencies
    cmds:
      - pnpm install

  fmt:
    desc: Format all files with prettier
    cmds:
      - pnpm prettier --write .

  build:
    desc: Build the TypeScript SDK
    cmds:
      - pnpm --filter @gameflow.gg/gameserver-sdk build

  test:
    desc: Run TypeScript SDK tests
    cmds:
      - pnpm --filter @gameflow.gg/gameserver-sdk test

  test:godot:
    desc: Run Godot SDK tests (requires a Godot 4 binary; set GODOT to override)
    cmds:
      - node sdk/godot/test/run.mjs

  test:rust:
    desc: Run Rust SDK tests (requires a Rust toolchain; Node for conformance)
    dir: sdk/rust
    cmds:
      - cargo test --workspace

  test:go:
    desc: Run Go SDK tests (requires a Go toolchain; Node for conformance)
    dir: sdk/go
    env:
      GOWORK: off # build the SDK in isolation, as a published consumer would
    cmds:
      - go test -race ./...

  test:unity:
    desc: Run Unity SDK core conformance tests (requires a .NET SDK; Node for conformance)
    dir: sdk/unity/tests
    cmds:
      - dotnet test GameFlow.Core.Tests/GameFlow.Core.Tests.csproj

  ci:proto:
    desc: Lint and format-check proto files
    cmds:
      - buf lint proto
      - buf format --diff --exit-code proto

  ci:sdk:
    desc: Full TypeScript SDK CI pipeline
    cmds:
      - pnpm install --frozen-lockfile
      - pnpm prettier --check .
      - pnpm --filter @gameflow.gg/gameserver-sdk typecheck
      - pnpm --filter @gameflow.gg/gameserver-sdk build
      - pnpm --filter @gameflow.gg/gameserver-sdk test

  ci:rust:
    desc: Full Rust SDK CI pipeline
    dir: sdk/rust
    cmds:
      - cargo fmt --check
      - cargo clippy --workspace --all-targets -- -D warnings
      - cargo build --workspace
      - cargo test --workspace

  ci:go:
    desc: Full Go SDK CI pipeline
    dir: sdk/go
    env:
      GOWORK: off # build the SDK in isolation, as a published consumer would
    cmds:
      - test -z "$(gofmt -l .)" || (echo 'gofmt needed:'; gofmt -l .; exit 1)
      - go vet ./...
      - go build ./...
      - go test -race ./...

  ci:unity:
    desc: Full Unity SDK CI pipeline (core build + conformance)
    dir: sdk/unity/tests
    cmds:
      - dotnet build Core.csproj -c Release
      - dotnet test GameFlow.Core.Tests/GameFlow.Core.Tests.csproj -c Release
