name: Release

on:
  workflow_dispatch:
    inputs:
      sdk:
        description: 'SDK to release'
        required: true
        type: choice
        options:
          - typescript
          - godot
          - rust
          - go
          - unreal
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release-typescript:
    if: inputs.sdk == 'typescript'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: SDK CI
        run: task ci:sdk

      - name: Set version
        working-directory: sdk/typescript
        run: npm version ${{ inputs.version }} --no-git-tag-version --allow-same-version

      - name: Publish to npm
        working-directory: sdk/typescript
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag and create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="typescript-v${{ inputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "@gameflow.gg/gameserver-sdk ${{ inputs.version }}" \
            --generate-notes

  release-godot:
    if: inputs.sdk == 'godot'
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: '4.6.3'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Godot
        run: |
          curl -fsSL -o /tmp/godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp
          echo "GODOT=/tmp/Godot_v${GODOT_VERSION}-stable_linux.x86_64" >> "$GITHUB_ENV"

      - name: Godot SDK tests
        run: node sdk/godot/test/run.mjs

      - name: Set version
        run: |
          sed -i 's/^version=.*/version="${{ inputs.version }}"/' sdk/godot/addons/gameflow/plugin.cfg

      - name: Package addon
        # Zip rooted at addons/gameflow so it unpacks cleanly into a project
        # root (same layout the Godot Asset Library expects).
        run: |
          cp LICENSE sdk/godot/addons/gameflow/
          cd sdk/godot
          zip -qr "$GITHUB_WORKSPACE/gameflow-godot-sdk-${{ inputs.version }}.zip" addons/gameflow

      - name: Tag and create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="godot-v${{ inputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "GameFlow Godot SDK ${{ inputs.version }}" \
            --generate-notes \
            "gameflow-godot-sdk-${{ inputs.version }}.zip"

  release-rust:
    if: inputs.sdk == 'rust'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Set up Node.js
        # Needed by the Rust conformance test.
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Set version
        working-directory: sdk/rust
        # Updates every workspace crate and the internal dependency requirement.
        run: cargo set-version --workspace ${{ inputs.version }}

      - name: Rust SDK CI
        working-directory: sdk/rust
        run: |
          cargo fmt --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      - name: Publish to crates.io
        working-directory: sdk/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p gameflow-gameserver-sdk --allow-dirty

      - name: Tag and create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="rust-v${{ inputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "GameFlow Rust SDK ${{ inputs.version }}" \
            --generate-notes

  release-go:
    if: inputs.sdk == 'go'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Set up Node.js
        # Needed by the Go conformance test.
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Go SDK CI
        run: task ci:go

      - name: Tag and create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        # The module lives in a subdirectory, so the version tag must be prefixed
        # with the module path (sdk/go/vX.Y.Z) for `go get` to resolve it. The Go
        # module proxy serves it from this tag; there is nothing to publish.
        run: |
          TAG="sdk/go/v${{ inputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "GameFlow Go SDK ${{ inputs.version }}" \
            --generate-notes

  release-unreal:
    if: inputs.sdk == 'unreal'
    runs-on: ubuntu-latest

    # No build/test step: the SDK is an Unreal C++ plugin and Unreal Engine
    # cannot run in standard CI. It is verified out-of-band via the WSL
    # automation suite (`bash sdk/unreal/scripts/run-tests.sh`) before release.

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set version
        run: |
          sed -i 's/"VersionName": *"[^"]*"/"VersionName": "${{ inputs.version }}"/' \
            sdk/unreal/GameFlow/GameFlow.uplugin

      - name: Package plugin
        # Unreal has no package registry. The plugin ships as source (no
        # precompiled binaries) so it builds against the user's engine (UE 5.3+).
        # Zip rooted at the GameFlow folder so it unpacks straight into
        # <Project>/Plugins/GameFlow.
        run: |
          cd sdk/unreal
          zip -qr "$GITHUB_WORKSPACE/gameflow-unreal-sdk-${{ inputs.version }}.zip" GameFlow \
            -x '*/Binaries/*' '*/Intermediate/*' '*/Saved/*' '*/DerivedDataCache/*'

      - name: Tag and create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        # The GitHub release (tag + zip) IS the distribution — there is nothing
        # to publish to. Users drop the unzipped GameFlow folder into Plugins/.
        run: |
          TAG="sdk/unreal/v${{ inputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "GameFlow Unreal SDK ${{ inputs.version }}" \
            --generate-notes \
            "gameflow-unreal-sdk-${{ inputs.version }}.zip"
